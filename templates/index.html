{% extends 'base.html' %}
{% block title %} 曾达博客 - 首页 {% endblock %}
{% block content %}
    <h1>欢迎访问曾达博客</h1>
    
    {% for post in posts %}
    <div class="post">
        <h2>{{ post['title'] }}</h2>
        <p>{{ post['content'] }}</p>
        <small>发布时间: {{ post['created'] }}</small>
    </div>
    {% endfor %}
{% endblock %}
